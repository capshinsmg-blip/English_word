<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#967BD9">
  <meta name="description" content="하루보카 - 에빙하우스 망각곡선 기반 영어회화 단어 암기 앱">
  <title>하루보카 - 영어회화 단어암기</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="stylesheet" href="css/style.css?v=8">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <img src="icons/wordmark.png" alt="하루보카 HARU VOCA" class="logo">
      <div class="topbar-streak" id="streak-badge">🔥 0일</div>
    </header>

    <main id="screen"><!-- 화면이 여기에 렌더링됨 --></main>

    <div class="ad-banner" id="ad-banner">
      <span class="ad-label">AD</span>
      <span class="ad-text">광고 영역 — 영어회화 강의 배너 자리</span>
    </div>

    <nav class="tabbar">
      <button class="tab active" data-tab="home" aria-label="홈">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>홈</span>
      </button>
      <button class="tab" data-tab="dict" aria-label="단어장">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        <span>단어장</span>
      </button>
      <button class="tab" data-tab="stats" aria-label="나의 학습">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span>나의 학습</span>
      </button>
      <button class="tab" data-tab="settings" aria-label="설정">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
        <span>설정</span>
      </button>
    </nav>
  </div>

  <script src="js/data.js?v=8"></script>
  <script src="js/srs.js?v=8"></script>
  <script src="js/app.js?v=8"></script>
</body>
</html>
