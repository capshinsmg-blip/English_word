  <!-- Google Analytics (GA4) — 본인 측정 ID(G-XXXXXXXXXX)로 한 번만 교체하면 됨 -->
  <script>
    window.GA_ID = "G-Y53DT8CBB6"; // ← GA4 속성 > 데이터 스트림에서 발급받은 측정 ID
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    // ID가 실제 값일 때만 GA 로드 (placeholder 상태에서는 아무 동작 안 함)
    var GA_ON = /^G-/.test(GA_ID) && !/X{4}/.test(GA_ID);
    if (GA_ON) {
      var gaScript = document.createElement("script");
      gaScript.async = true;
      gaScript.src = "https://www.googletagmanager.com/gtag/js?id=" + GA_ID;
      document.head.appendChild(gaScript);
      gtag("js", new Date());
      gtag("config", GA_ID);
    }
    // 앱 어디서나 호출하는 이벤트 추적 헬퍼 (ID 미설정 시 무해한 no-op)
    window.track = function (name, params) { if (GA_ON) gtag("event", name, params || {}); };
  </script>
